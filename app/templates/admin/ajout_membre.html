<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un Membre - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f0fdfa; color: #1A1A1A; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(0, 108, 103, 0.2); }
        @media (max-width: 1024px) {
            aside {
                transform: translateX(-100%);
                transition: transform 0.3s ease-in-out;
                position: fixed;
                z-index: 50;
            }
            aside.open {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Overlay pour mobile -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden transition-opacity" onclick="toggleSidebar()"></div>

    {% include 'partials/sidebar_admin.html' %}
    
    <main class="lg:ml-64 p-4 lg:p-8 transition-all duration-300">
        <div class="mb-6 flex items-start gap-4">
            <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg text-gray-600 hover:bg-gray-100 focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <div>
                <a href="{% url 'liste_membres' %}" class="text-[#006C67] hover:underline text-sm">← Retour aux membres</a>
                <h1 class="text-2xl lg:text-3xl font-bold text-[#006C67] mt-2">Ajouter un Membre</h1>
            </div>
        </div>

        <div class="glass-card p-8 rounded-xl max-w-4xl">
            <form method="POST" class="space-y-6">
                {% csrf_token %}
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-500 mb-2">Nom *</label>
<input type="text" name="nom" required class="w-full px-4 py-3 bg-white border border-[#006C67]/20 rounded-lg text-gray-800 focus:border-[#006C67] focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-500 mb-2">Prénom *</label>
<input type="text" name="prenom" required class="w-full px-4 py-3 bg-white border border-[#006C67]/20 rounded-lg text-gray-800 focus:border-[#006C67] focus:outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-500 mb-2">Email</label>
<input type="email" name="email" class="w-full px-4 py-3 bg-white border border-[#006C67]/20 rounded-lg text-gray-800 focus:border-[#006C67] focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-500 mb-2">Téléphone</label>
<input type="tel" name="telephone" class="w-full px-4 py-3 bg-white border border-[#006C67]/20 rounded-lg text-gray-800 focus:border-[#006C67] focus:outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-500 mb-2">Adresse</label>
<textarea name="adresse" rows="2" class="w-full px-4 py-3 bg-white border border-[#006C67]/20 rounded-lg text-gray-800 focus:border-[#006C67] focus:outline-none"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-500 mb-2">Département *</label>
<select name="departement" required class="w-full px-4 py-3 bg-white border border-[#006C67]/20 rounded-lg text-gray-800 focus:border-[#006C67] focus:outline-none">
                        <option value="">Sélectionner un département</option>
                        <option value="ADA">ADA</option>
                        <option value="ADN">ADN</option>
                        <option value="CLASSE_BATEME">Classe de Batême</option>
                        <option value="COMMUNICATION">Communication</option>
                        <option value="ECODIM">ECODIM</option>
                        <option value="EVANGELISATION">Evangelisation</option>
                        <option value="GESTION_CULTE">Gestion de Culte</option>
                        <option value="LOGISTIQUE">Logistique</option>
                        <option value="MUSIQUE_LOUANGE">Musique et Louange</option>
                        <option value="PORTIER">Portier</option>
                        <option value="SAINTE_CENE">Sainte Cène</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-500 mb-2">Rôle</label>
<select name="role" class="w-full px-4 py-3 bg-white border border-[#006C67]/20 rounded-lg text-gray-800 focus:border-[#006C67] focus:outline-none">
                            <option value="MEMBRE">Membre</option>
                            <option value="STAGIAIRE">Stagiaire</option>
                            <option value="RESPONSABLE">Responsable</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-500 mb-2">Statut</label>
<select name="status" class="w-full px-4 py-3 bg-white border border-[#006C67]/20 rounded-lg text-gray-800 focus:border-[#006C67] focus:outline-none">
                            <option value="ACTIF">Actif</option>
                            <option value="INACTIF">Inactif</option>
                        </select>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <label class="flex items-center gap-2">
                        <input type="checkbox" name="est_sentinelle" class="w-4 h-4">
                        <span class="text-sm text-gray-500">Est Sentinelle</span>
                    </label>
                    <label class="flex items-center gap-2">
                        <input type="checkbox" name="est_responsable" class="w-4 h-4">
                        <span class="text-sm text-gray-500">Est Responsable</span>
                    </label>
                </div>

                <div class="flex gap-4 pt-4">
                    <a href="{% url 'liste_membres' %}" class="px-6 py-3 bg-gray-600 hover:bg-gray-700 text-white font-bold rounded-lg transition-all">Annuler</a>
<button type="submit" class="px-6 py-3 bg-[#006C67] hover:bg-[#00554F] text-white font-bold rounded-lg transition-all">Ajouter le membre</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        // Sidebar Toggle Script
        function toggleSidebar() {
            const sidebar = document.querySelector('aside');
            const overlay = document.getElementById('sidebarOverlay');
            
            if (sidebar) sidebar.classList.toggle('open');
            if (overlay) overlay.classList.toggle('hidden');
        }
    </script>
</body>
</html>
